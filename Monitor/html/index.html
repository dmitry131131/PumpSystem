<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>UART Controller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <!-- Модальное окно для уведомлений (зелёное/красное) -->
        <div id="notificationModal" class="modal notification-modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <p id="modalMessage">Сообщение</p>
            </div>
        </div>

        <!-- Модальное окно для редактирования устройства -->
        <div id="editModal" class="modal edit-modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h3 id="editTitle">Редактирование устройства</h3>
                <p><strong>ID:</strong> <span id="editId"></span></p>
                <label for="editValue">Новое значение площади поршня (квадратные сантиметры):</label>
                <input type="number" id="editValue" step="any" placeholder="Введите число">
                <button id="saveEditBtn">Сохранить</button>

                <!-- Секция управления командой вращения -->
                <hr style="margin: 15px 0;">
                <h4>Управление синхронным вращением</h4>
                <label for="volumeInput">Объём (в мкл):</label>
                <input type="number" id="volumeInput" step="any" placeholder="Например, 1.5">
                <label for="timeInput">Время совершения подачи (секунды):</label>
                <input type="number" id="timeInput" step="any" placeholder="Например, 0.5">
                <button id="sendVolumeTimeBtn">Сохранить</button>

                <hr style="margin: 15px 0;">
                <h4>Ручное управление движением</h4>
                <label for="stepsInput">Количество оборотов (натуральное число):</label>
                <input type="number" id="stepsInput" min="1" step="1" value="1">
                <label for="directionSelect">Направление:</label>
                <select id="directionSelect">
                    <option value="forward">Вперёд</option>
                    <option value="backward">Назад</option>
                </select>

                <button id="sendCommandBtn">Запустить вращение</button>
            </div>
        </div>

        <h2>Pump system monitor</h2>

        <div class="input-group">
            <input type="text" id="portNameInput" placeholder="/dev/ttyUSB0">
            <button id="sendPortNameBtn">Connect</button>
        </div>

        <div id="devicesContainer"></div>

        <h4>Период исполнения в секундах</h4>
        <div class="input-group">
            <input type="number" id="periodInput" placeholder="10">
        </div>

        <div class="button-group">
            <button id="startButton">Запустить</button>
            <button id="stopButton">Остановить</button>
        </div>

        <div id="status">Ожидание действий...</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
